<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>San pham </title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/stylect.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
		<script src = "../js/script.js"></script>
		
	<body>
        <div class="back">
            <a href="san-pham.html" class="bk">
               <span class="nut">&#8592;</span> Quay lại 
            </a>
        </div>
		<div class="container mt-5 mb-5">
            <div class="row align-items-start">
                
                <div class="col-md-5 col-12 mb-4 mb-md-0">
                    <div class="khunghinh">
                        <img id="hinh" src="" alt="Hình album">
                    </div>
                </div>
                
                <div class="col-md-7 col-12 ps-md-5">
                    <div class="khunginfo">
                        <h1 id="ctname" class="ten"></h1>
                        <h3 id="ctname1" class="ten1"></h3>
            
                        <div class="khunggia">
                            <p id="gia" class="giatien"></p>
                        </div>
            
                        <h5 class="khungmota">Về tác phẩm:</h5>
                        <div id="mota" class="motact">
                        </div>
            
                        <div class="nutmuathem">
                            <button onclick="themvaogio()" class="nutct them" style="display: inline-block; text-align: center; cursor: pointer; line-height: normal;">
                                THÊM VÀO GIỎ
                            </button>
            
                            <button class="nutct mua" onclick="themvaogio()">MUA NGAY</button>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
		<script>

			const urlParams = new URLSearchParams(window.location.search);
			const productId = urlParams.get('id');

			const allSongs = [...trendList,...albList, ...newList];
        
            const product = allSongs.find(p => p.id === parseInt(productId));

   			if (product) {
        	document.getElementById("ctname").innerText = product.name;
            document.getElementById("ctname1").innerText = product.name1;
        	document.getElementById("gia").innerText = "Giá: " + product.price.toLocaleString() + "đ";
			document.getElementById("hinh").src=product.img;
        	document.getElementById("hinh").alt=product.name;
			document.getElementById("mota").innerText=product.desc;
            } else {
                document.body.innerHTML = "<h1>Không tìm thấy sản phẩm!</h1>";
            }


		</script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
       

        <label for="moPopupGioHang" class="giohang">
            Giỏ hàng của tôi
        </label>
        <input type="checkbox" id="moPopupGioHang" hidden>
        <div class="popup">
            <div class="pbox">
                
                <div class="pchu">
                    <h2 class="pgio">Giỏ hàng</h2>
                    <label for="moPopupGioHang" class="closepop">✖</label>
                </div>

                <div id="khungds" class="plistcont">
                </div>

                <div class="ptong">
                    Tổng tiền: <span id="tongtien" class="ptien">0 đ</span>
                </div>

                <button class="thanhtoan">Thanh toán</button>
                
            </div>
        </div>
	</body>
</html>
